<svg width="1250" height="650" viewBox="0 0 1250 650" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .terminal { font-family: 'Fira Code', 'Consolas', 'Courier New', monospace; font-size: 14.5px; fill: #a9b1d6; }
    .ascii { font-size: 9.5px; fill: #9ece6a; font-weight: bold; }
    .title { font-weight: bold; fill: #bb9af7; font-size: 16px; }
    .label { font-weight: bold; fill: #7aa2f7; }
    .value { fill: #a9b1d6; }
    .stats { font-weight: bold; fill: #f7768e; }
    .divider { fill: #565f89; }
    .bg { fill: #1a1b26; stroke: #565f89; stroke-width: 1.5; }
    .topbar { fill: #15161e; }
  </style>

  <!-- Terminal Window Background -->
  <rect width="1250" height="650" rx="10" class="bg" />
  
  <!-- Terminal Top Bar -->
