<svg xmlns="http://www.w3.org/2000/svg" width="1250" height="650" viewBox="0 0 1250 650" fill="none">
  <style>
    .terminal { font-family: 'Fira Code', 'Consolas', 'Courier New', monospace; font-size: 14.5px; fill: #343b58; }
